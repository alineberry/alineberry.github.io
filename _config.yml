# =============================================================================
# Theme
# =============================================================================
remote_theme           : "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin  : "dark"   # air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# =============================================================================
# Site
# =============================================================================
locale                 : "en-US"
title                  : "Adam Lineberry"
title_separator        : "—"
name                   : "Adam Lineberry"
description            : "Notes and writing on machine learning, data science, and the occasional tangent."
url                    : "https://adamlineberry.io"
baseurl                : ""
repository             : "alineberry/alineberry.github.io"
words_per_minute       : 200
breadcrumbs            : false
search                 : true
search_full_content    : true
logo                   : # path of logo image, e.g. "/images/logo.png"
masthead_title         : " "
teaser                 : "/images/headshot2.jpeg"

# Open Graph / Twitter card defaults
og_image               : "/images/headshot2.jpeg"
social:
  type                 : Person
  name                 : "Adam Lineberry"
  links:
    - "https://www.linkedin.com/in/adam-lineberry/"
    - "https://github.com/alineberry"

# =============================================================================
# Author profile (sidebar)
# =============================================================================
author:
  name             : "Adam Lineberry"
  avatar           : "/images/headshot2.jpeg"
  bio              : "Data Scientist"
  location         : "Denver, CO"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/adam-lineberry/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alineberry"
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://twitter.com/adamlineberryML"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/adam-lineberry/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alineberry"
    - label: "X"
      icon: "fab fa-fw fa-x-twitter"
      url: "https://twitter.com/adamlineberryML"

# =============================================================================
# Build
# =============================================================================
include:
  - _pages
exclude:
  - vendor
  - .bundle
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Permalinks / pagination
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# Archives (Liquid-based, GitHub Pages compatible)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML compression
compress_html:
  clippings: all
  ignore:
    envs: development

# =============================================================================
# Defaults
# =============================================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
